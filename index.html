<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>FreshMart 3D · Grocery Store</title>
<meta name="description" content="A 3D grocery store in your browser — drive the cart down the aisles and grab items off the shelves. Three.js, photogrammetry models, HDRI lighting." />
<meta property="og:type" content="website" />
<meta property="og:title" content="FreshMart 3D — a virtual grocery store in your browser" />
<meta property="og:description" content="Drive the cart down the aisles, grab items off the shelves, chat with Mr. Peel. Built with Three.js — photogrammetry scans, generated label art, HDRI lighting." />
<meta property="og:url" content="https://tpminhtam.github.io/freshmart-3d/" />
<meta property="og:image" content="https://tpminhtam.github.io/freshmart-3d/assets/og.jpg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --teal:#0FB5AE;
    --coral:#FF6B5C;
    --gold:#F5B700;
    --navy:#16324F;
    --ink:#0e1113;
    --glass:rgba(20,26,30,0.72);
    --glassborder:rgba(255,255,255,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--ink);font-family:'Outfit',system-ui,sans-serif;color:#fff;}
  #app{display:flex;width:100vw;height:100vh;}
  #scene{position:relative;flex:1;min-width:0;}
  canvas{display:block;}

  /* ---------- HUD ---------- */
  .hud{position:absolute;pointer-events:none;z-index:5;}
  #creditsLink{top:14px;right:16px;pointer-events:auto;background:var(--glass);border:1px solid var(--glassborder);
    border-radius:20px;padding:6px 12px;font-size:10px;letter-spacing:2px;text-transform:uppercase;
    color:#9fb2bd;text-decoration:none;}
  #creditsLink:hover{color:#fff;border-color:rgba(255,255,255,.3);}
  #brand{top:22px;left:50%;transform:translateX(-50%);text-align:center;}
  #brand .logo{font-weight:800;font-size:26px;letter-spacing:1px;
    background:linear-gradient(90deg,var(--teal),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 20px rgba(15,181,174,.25);}
  #brand .tag{font-size:11px;letter-spacing:4px;color:#9fb2bd;text-transform:uppercase;margin-top:-2px;}

  #controls{top:20px;left:20px;background:var(--glass);border:1px solid var(--glassborder);
    backdrop-filter:blur(14px);border-radius:16px;padding:14px 16px;width:230px;
    box-shadow:0 18px 50px rgba(0,0,0,.45);}
  #controls h3{margin:0 0 10px;font-size:12px;letter-spacing:2px;color:var(--teal);text-transform:uppercase;}
  .keys{display:grid;grid-template-columns:auto 1fr;gap:7px 12px;align-items:center;font-size:12.5px;color:#cdd9df;}
  .kbd{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;padding:0 7px;
    background:linear-gradient(180deg,#2b3338,#1a2024);border:1px solid rgba(255,255,255,.12);
    border-radius:7px;font-weight:600;font-size:12px;box-shadow:0 2px 0 rgba(0,0,0,.4);}
  .keyrow{display:flex;gap:4px;}

  #cartbar{bottom:22px;left:20px;display:flex;align-items:center;gap:14px;
    background:var(--glass);border:1px solid var(--glassborder);backdrop-filter:blur(14px);
    border-radius:18px;padding:12px 18px;box-shadow:0 18px 50px rgba(0,0,0,.45);}
  #cartbar .ic{font-size:26px;}
  #cartbar .count{font-size:26px;font-weight:800;color:var(--gold);line-height:1;}
  #cartbar .lbl{font-size:10px;letter-spacing:2px;color:#9fb2bd;text-transform:uppercase;}
  #cartbar .total{padding-left:14px;margin-left:4px;border-left:1px solid rgba(255,255,255,.12);}
  #cartbar .total .count{color:var(--teal);}

  #pickhint{bottom:26px;left:50%;transform:translateX(-50%);background:rgba(245,183,0,.16);
    border:1px solid rgba(245,183,0,.5);color:#ffe9a8;padding:9px 16px;border-radius:30px;font-size:13px;
    font-weight:600;opacity:0;transition:opacity .25s;backdrop-filter:blur(6px);}
  #pickhint.show{opacity:1;}
  #pickhint .kbd{color:#fff;background:rgba(0,0,0,.35);}

  /* ---------- touch controls (phones/tablets only — desktop untouched) ---------- */
  #joystick,#grabBtn{display:none;}
  @media (pointer: coarse){
    #scene canvas{touch-action:none;}
    #controls{display:none;}
    #brand{display:none;}                       /* the 3D storefront sign carries the branding */
    #cartbar{top:16px;left:16px;bottom:auto;}
    #pickhint{bottom:172px;}
    #joystick{display:block;bottom:34px;left:22px;bottom:calc(34px + env(safe-area-inset-bottom));
      left:calc(22px + env(safe-area-inset-left));width:124px;height:124px;border-radius:50%;
      background:var(--glass);border:1px solid var(--glassborder);pointer-events:auto;touch-action:none;
      backdrop-filter:blur(6px);}
    #joyKnob{position:absolute;left:50%;top:50%;width:54px;height:54px;margin:-27px 0 0 -27px;border-radius:50%;
      background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);}
    #grabBtn{display:flex;align-items:center;justify-content:center;bottom:150px;right:22px;
      bottom:calc(150px + env(safe-area-inset-bottom));right:calc(22px + env(safe-area-inset-right));
      width:86px;height:86px;border-radius:50%;background:rgba(245,183,0,.30);
      border:1.5px solid rgba(245,183,0,.8);color:#fff;font:700 13px/1 Outfit,system-ui,sans-serif;
      letter-spacing:1.5px;pointer-events:auto;touch-action:none;-webkit-tap-highlight-color:transparent;
      backdrop-filter:blur(6px);}
    #grabBtn:active{background:rgba(245,183,0,.55);}
  }

  /* toast */
  #toast{top:84px;left:50%;transform:translateX(-50%) translateY(-12px);background:var(--glass);
    border:1px solid var(--glassborder);padding:10px 18px;border-radius:30px;font-size:14px;font-weight:600;
    opacity:0;transition:all .3s;backdrop-filter:blur(10px);}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- Floating Chat Widget ---------- */
  #chatWidget{position:fixed;right:24px;bottom:24px;z-index:30;font-family:'Outfit',system-ui,sans-serif;}

  /* collapsed launcher (banana button) */
  #launcher{position:relative;width:118px;height:138px;border:none;background:none;padding:0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:opacity .25s,transform .25s;filter:drop-shadow(0 10px 14px rgba(0,0,0,.45));}
  #launcher:hover{transform:scale(1.07) rotate(-3deg);}
  #launcher:active{transform:scale(1.02);}
  #launcher .launcher-banana{width:100%;height:100%;pointer-events:none;}
  #launcher .launcher-banana svg{width:100%;height:100%;animation:bob 3.4s ease-in-out infinite;transform-origin:50% 88%;}
  #launcher .wave{transform-box:fill-box;transform-origin:bottom right;animation:handWave 2.4s ease-in-out infinite;}
  @keyframes handWave{0%,55%,100%{transform:rotate(0deg);}68%{transform:rotate(-20deg);}80%{transform:rotate(4deg);}90%{transform:rotate(-12deg);}}

  /* typewriter teaser bubble */
  .teaser{position:absolute;top:50%;right:126px;transform:translate(10px,-50%) scale(.92);transform-origin:right center;
    background:#fff;color:var(--navy);padding:12px 16px;border-radius:16px;
    font-size:14px;font-weight:600;white-space:nowrap;box-shadow:0 14px 34px rgba(0,0,0,.38);
    opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;}
  .teaser.show{opacity:1;transform:translate(0,-50%) scale(1);pointer-events:auto;cursor:pointer;}
  .teaser .teaser-tail{position:absolute;right:-6px;top:50%;margin-top:-7px;width:14px;height:14px;
    background:#fff;transform:rotate(45deg);border-radius:0 4px 0 0;}
  .teaser .caret{display:inline-block;width:2px;height:15px;margin-left:1px;vertical-align:-2px;
    background:var(--navy);animation:caretBlink .8s steps(1) infinite;}
  @keyframes caretBlink{0%,50%{opacity:1;}51%,100%{opacity:0;}}

  /* ---------- Assistant (expanded panel) ---------- */
  #assistant{position:absolute;right:0;bottom:0;width:384px;height:580px;max-height:calc(100vh - 48px);
    display:flex;flex-direction:column;overflow:hidden;border-radius:22px;
    background:linear-gradient(180deg,#141a1e,#0c1013);border:1px solid var(--glassborder);
    box-shadow:0 28px 80px rgba(0,0,0,.62);transform-origin:bottom right;
    opacity:0;transform:translateY(18px) scale(.55);pointer-events:none;
    transition:opacity .28s ease,transform .3s cubic-bezier(.21,1.02,.46,1.01);}
  #chatWidget.expanded #assistant{opacity:1;transform:none;pointer-events:auto;}
  #chatWidget.expanded #launcher{opacity:0;transform:scale(.4);pointer-events:none;}
  #chatWidget.expanded .teaser{opacity:0;pointer-events:none;}

  #asst-head{padding:18px 20px 8px;text-align:center;position:relative;
    background:radial-gradient(120% 90% at 50% 0%,rgba(245,183,0,.16),transparent 70%);}
  #asst-head h2{margin:6px 0 0;font-size:17px;font-weight:700;}
  #asst-head p{margin:2px 0 0;font-size:11px;letter-spacing:1px;color:#8aa0ab;text-transform:uppercase;}
  .status{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:#7fe3a0;margin-top:6px;letter-spacing:1px;}
  .status .dot{width:7px;height:7px;border-radius:50%;background:#43d67e;box-shadow:0 0 8px #43d67e;}
  #closeChat{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;
    border:1px solid var(--glassborder);background:rgba(255,255,255,.06);color:#cdd9df;
    font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:.18s;z-index:2;}
  #closeChat:hover{background:var(--coral);color:#fff;border-color:var(--coral);transform:rotate(90deg);}

  /* Banana avatar */
  .banana-stage{width:130px;height:130px;margin:0 auto;position:relative;filter:drop-shadow(0 14px 22px rgba(245,183,0,.28));}
  .banana-stage svg{width:100%;height:100%;animation:bob 3.4s ease-in-out infinite;transform-origin:50% 80%;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-7px) rotate(2deg);}}
  .eye .pupil{transform-box:fill-box;transform-origin:center;animation:blink 4.6s infinite;}
  @keyframes blink{0%,94%,100%{transform:scaleY(1);}97%{transform:scaleY(.1);}}
  .mouth{transform-box:fill-box;transform-origin:center;transition:transform .08s;}
  .talking .mouth{animation:talk .26s linear infinite;}
  @keyframes talk{0%,100%{transform:scaleY(.35);}50%{transform:scaleY(1.15);}}
  .talking svg{animation:bob 1.1s ease-in-out infinite;}

  #chat{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
  #chat::-webkit-scrollbar{width:7px;}
  #chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px;}
  .msg{max-width:84%;padding:10px 13px;border-radius:15px;font-size:13.5px;line-height:1.45;
    animation:pop .25s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(6px) scale(.98);}to{opacity:1;transform:none;}}
  .msg.bot{align-self:flex-start;background:#1d262b;border:1px solid rgba(255,255,255,.06);border-bottom-left-radius:5px;color:#e6eef2;}
  .msg.me{align-self:flex-end;background:linear-gradient(135deg,var(--teal),#0c8f89);border-bottom-right-radius:5px;color:#fff;font-weight:500;}
  .msg.bot b{color:var(--gold);}

  .chips{display:flex;flex-wrap:wrap;gap:7px;padding:0 16px 10px;}
  .chip{pointer-events:auto;cursor:pointer;font-size:11.5px;padding:6px 11px;border-radius:20px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#cdd9df;transition:.18s;}
  .chip:hover{background:var(--gold);color:#222;border-color:var(--gold);transform:translateY(-1px);}

  #composer{display:flex;gap:9px;padding:14px 16px;border-top:1px solid var(--glassborder);background:#0c1013;}
  #chatInput{flex:1;background:#1a2227;border:1px solid rgba(255,255,255,.12);border-radius:24px;
    padding:11px 16px;color:#fff;font-size:13.5px;outline:none;font-family:inherit;transition:.18s;}
  #chatInput:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,181,174,.18);}
  #send{width:44px;height:44px;border:none;border-radius:50%;cursor:pointer;font-size:18px;
    background:linear-gradient(135deg,var(--gold),#e09e00);color:#2a2200;display:flex;align-items:center;justify-content:center;
    transition:.18s;box-shadow:0 6px 16px rgba(245,183,0,.35);}
  #send:hover{transform:scale(1.07) rotate(8deg);}

  /* ---------- Loader ---------- */
  #loader{position:fixed;inset:0;z-index:50;background:radial-gradient(120% 120% at 50% 30%,#16242b,#070a0c);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .7s;padding:20px;}
  #loader.hide{opacity:0;pointer-events:none;}
  #loader .spin{width:130px;height:130px;animation:bob 1.6s ease-in-out infinite;}
  #loader h1{margin:0;font-weight:800;font-size:30px;letter-spacing:1px;
    background:linear-gradient(90deg,var(--teal),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;}
  #loader p{margin:0;color:#88a;letter-spacing:3px;font-size:12px;text-transform:uppercase;text-align:center;}
  .bar{width:230px;height:5px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;}
  .bar i{display:block;height:100%;width:30%;border-radius:4px;background:linear-gradient(90deg,var(--teal),var(--gold));
    animation:load 1.3s ease-in-out infinite;}
  @keyframes load{0%{margin-left:-30%;}100%{margin-left:100%;}}
  #errbox{max-width:80vw;white-space:pre-wrap;color:#ff9b8e;font-size:12px;font-family:monospace;
    background:rgba(0,0,0,.45);padding:14px;border-radius:10px;max-height:40vh;overflow:auto;border:1px solid rgba(255,155,142,.3);}

  @media(max-width:820px){
    #controls{width:180px;}
  }
  @media(max-width:520px){
    #chatWidget{right:14px;bottom:14px;}
    #assistant{width:calc(100vw - 28px);height:calc(100vh - 96px);}
    #launcher{width:100px;height:118px;}
    .teaser{right:108px;font-size:13px;}
  }
  /* Mr. Peel on touch devices: small and tucked into the corner so he never
     covers the GRAB button. Keep this block LAST — the max-width block above
     also matches phones and would win the cascade otherwise. */
  @media (pointer: coarse){
    #chatWidget{right:8px;bottom:8px;}
    #launcher{width:58px;height:68px;}
    #launcher:hover{transform:none;}
    .teaser{right:66px;font-size:12.5px;padding:9px 12px;}
    #assistant{width:min(384px,calc(100vw - 16px));}
  }
</style>
</head>
<body>
<div id="loader">
  <div class="spin" id="loaderBanana"></div>
  <h1>FreshMart&nbsp;3D</h1>
  <p id="loaderMsg">Stocking the shelves…</p>
  <div class="bar"><i></i></div>
</div>

<div id="app">
  <div id="scene">
    <div id="brand" class="hud">
      <div class="logo">FreshMart&nbsp;Market</div>
      <div class="tag">Fresh Groceries · Every&nbsp;Day</div>
    </div>

    <div id="controls" class="hud">
      <h3>Drive your cart</h3>
      <div class="keys">
        <span class="keyrow"><span class="kbd">↑</span></span><span>Push forward</span>
        <span class="keyrow"><span class="kbd">↓</span></span><span>Reverse</span>
        <span class="keyrow"><span class="kbd">←</span><span class="kbd">→</span></span><span>Steer</span>
        <span class="keyrow"><span class="kbd">Space</span></span><span>Grab item</span>
      </div>
    </div>

    <div id="cartbar" class="hud">
      <span class="ic">🛒</span>
      <div><div class="count" id="cartCount">0</div><div class="lbl">items</div></div>
      <div class="total"><div class="count" id="cartTotal">$0</div><div class="lbl">basket total</div></div>
    </div>

    <a id="creditsLink" class="hud" href="credits.html" target="_blank" rel="noopener">ⓘ Credits</a>
    <div id="joystick" class="hud"><div id="joyKnob"></div></div>
    <button id="grabBtn" class="hud">GRAB</button>
    <div id="pickhint" class="hud"><span class="kbd">Space</span>&nbsp; Grab this item</div>
    <div id="toast" class="hud"></div>
  </div>

</div>

<!-- ============================================================
     FLOATING BANANA CHAT WIDGET — collapsed launcher + expandable panel
     ============================================================ -->
<div id="chatWidget" class="collapsed">
  <!-- collapsed view: typewriter teaser + banana launcher -->
  <div id="teaser" class="teaser"><span id="teaserText"></span><span class="caret"></span><i class="teaser-tail"></i></div>
  <button id="launcher" title="Chat with Mr. Peel" aria-label="Open chat with Mr. Peel">
    <span class="launcher-banana" id="launcherBanana"></span>
  </button>

  <!-- expanded view: full Mr. Peel assistant -->
  <aside id="assistant">
    <div id="asst-head">
      <button id="closeChat" title="Minimize" aria-label="Minimize chat">×</button>
      <div class="banana-stage" id="bananaAvatar"></div>
      <h2>Mr.&nbsp;Peel</h2>
      <p>Your Produce Concierge</p>
      <span class="status"><span class="dot"></span>ONLINE &amp; A-PEEL-ING</span>
    </div>
    <div id="chat"></div>
    <div class="chips" id="chips"></div>
    <div id="composer">
      <input id="chatInput" type="text" autocomplete="off" placeholder="Ask Mr. Peel anything…" />
      <button id="send" title="Send">➤</button>
    </div>
  </aside>
</div>

<!-- ============================================================
     BOOTSTRAP: error overlay + resilient Three.js loader
     ============================================================ -->
<script>
function showFatal(msg){
  var l=document.getElementById('loader');
  if(!l) return;
  l.classList.remove('hide');
  var m=document.getElementById('loaderMsg'); if(m) m.textContent='Something went wrong';
  var pre=document.getElementById('errbox');
  if(!pre){pre=document.createElement('pre');pre.id='errbox';l.appendChild(pre);}
  pre.textContent=String(msg);
}
window.addEventListener('error',function(e){
  showFatal((e.error&&e.error.stack)||e.message||'Unknown error');
});

    '<path d="M87,34 C77,53 75,80 68,105 C60,130 52,155 63,177 C67,184 73,189 80,191 C70,171 72,146 78,121 C85,91 88,58 95,37 C92,31 89,31 87,34 Z" fill="url(#pshade)" opacity="0.5"/>'+
    '<path d="M120,42 C128,55 132,71 131,87" fill="none" stroke="#FFF3B0" stroke-width="8" stroke-linecap="round" opacity="0.85"/>'+
    '<path d="M84,56 C76,90 72,132 80,164" fill="none" stroke="#E8A91A" stroke-width="3.4" stroke-linecap="round" opacity="0.5"/>'+
    '<g transform="rotate(-10 94 20)">'+
      '<path d="M88,28 l-4,-16 q-1.2,-4.8 3.6,-5.3 l10,-1 q4.8,-0.5 5.7,4.2 l2.8,16 z" fill="#8A5A20" stroke="#5B3A12" stroke-width="2.4" stroke-linejoin="round"/>'+
      '<ellipse cx="93.5" cy="7.5" rx="7.8" ry="3.1" fill="#A97B3C" transform="rotate(-6 93.5 7.5)"/>'+
    '</g>'+
    '<ellipse cx="76" cy="185" rx="8.6" ry="6.2" fill="#7A5222" stroke="#5B3A12" stroke-width="2" transform="rotate(-32 76 185)"/>'+
    '<g class="eye">'+
      '<ellipse cx="88" cy="84" rx="12.6" ry="15" fill="#fff"/>'+
      '<g class="pupil"><circle cx="91" cy="87" r="6.8" fill="#33240A"/><circle cx="93.4" cy="84.4" r="2.6" fill="#fff"/></g>'+
    '</g>'+
    '<g class="eye">'+
      '<ellipse cx="121" cy="81" rx="12.6" ry="15" fill="#fff"/>'+
      '<g class="pupil"><circle cx="124" cy="84" r="6.8" fill="#33240A"/><circle cx="126.4" cy="81.4" r="2.6" fill="#fff"/></g>'+
    '</g>'+
    '<path d="M75,61 q6,-6.5 14,-4.5" fill="none" stroke="#B97F16" stroke-width="4" stroke-linecap="round"/>'+
    '<path d="M113,58 q7,-6 15,-3" fill="none" stroke="#B97F16" stroke-width="4" stroke-linecap="round"/>'+
    '<ellipse cx="73" cy="103" rx="7.6" ry="5.4" fill="#FF9E80" opacity="0.55" transform="rotate(-12 73 103)"/>'+
    '<ellipse cx="136" cy="100" rx="7.6" ry="5.4" fill="#FF9E80" opacity="0.55" transform="rotate(12 136 100)"/>'+
    '<g class="mouth">'+

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { RectAreaLightUniformsLib } from 'three/addons/lights/RectAreaLightUniformsLib.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { GTAOPass } from 'three/addons/postprocessing/GTAOPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

function main(){
  var avatarEl = document.getElementById('bananaAvatar');

  /* ---------- renderer / scene ---------- */
  // Touch-first devices get on-screen controls, a wider view, and a lower DPR cap
  // (GTAO+bloom at DPR 3 is a slideshow on phones). Desktop paths are unchanged.
  const IS_TOUCH = window.matchMedia('(pointer: coarse)').matches;
  const sceneEl = document.getElementById('scene');
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, IS_TOUCH?1.5:2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.NeutralToneMapping;   // Khronos PBR Neutral — keeps product/brand colors true
  renderer.toneMappingExposure = 0.85;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  sceneEl.appendChild(renderer.domElement);
  const MAXANISO = renderer.capabilities.getMaxAnisotropy();

  const scene = new THREE.Scene();
  window.__scene = scene;                       // debug/screenshot tooling hook
  scene.background = new THREE.Color(0xe7edf0);
  scene.fog = new THREE.Fog(0xe7edf0, 46, 104);

  const camera = new THREE.PerspectiveCamera(IS_TOUCH?66:60, 1, 0.1, 200);

  /* post-processing: GTAO grounds items on the shelves, subtle bloom on the light fixtures,
     OutputPass applies NeutralToneMapping + sRGB as the final step */
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const gtao = new GTAOPass(scene, camera, sceneEl.clientWidth||window.innerWidth, sceneEl.clientHeight||window.innerHeight);
  composer.addPass(gtao);
  composer.addPass(new UnrealBloomPass(new THREE.Vector2(1024,1024), 0.12, 0.55, 1.4)); // fixtures only — high threshold keeps white surfaces from glowing
  composer.addPass(new OutputPass());

  function resize(){
    const w = sceneEl.clientWidth || window.innerWidth, h = sceneEl.clientHeight || window.innerHeight;
    renderer.setSize(w,h);
    composer.setSize(w,h);
    camera.aspect = w/h;
    // portrait phones crop the horizontal view hard — widen the vertical FOV to compensate
    if(IS_TOUCH) camera.fov = h>w ? 76 : 66;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);

  /* real retail HDRI (Poly Haven "Phone Shop", CC0) — image-based lighting + reflections
     for every PBR material; r152+ auto-PMREMs equirect textures on assignment */
  new RGBELoader().load('assets/phone_shop_1k.hdr', function(t){
    t.mapping = THREE.EquirectangularReflectionMapping;
    scene.environment = t;
    scene.environmentIntensity = 0.55;
  }, undefined, function(err){
    console.warn('HDRI failed to load — scene falls back to lights only', err);
  });

  /* ---------- text helper ---------- */
  function makeText3D(text,size,color,x,y,z){
    const c=document.createElement('canvas');c.width=1024;c.height=256;const g=c.getContext('2d');
    g.fillStyle='#'+color.toString(16).padStart(6,'0');
    g.font='800 150px Outfit, sans-serif';g.textAlign='center';g.textBaseline='middle';
    g.fillText(text,512,138);

    const m=new THREE.Mesh(new THREE.PlaneGeometry(size*4,size),
      new THREE.MeshBasicMaterial({map:t,transparent:true}));

  }

  /* ---------- lighting ---------- */
  scene.add(new THREE.HemisphereLight(0xffffff, 0xc7cdc9, 0.35)); // lowered — the HDRI now provides fill
  scene.add(new THREE.AmbientLight(0xffffff, 0.10));

  const key = new THREE.DirectionalLight(0xffffff, 1.18);
  key.position.set(18, 40, 22);
  key.castShadow = true;
  key.shadow.mapSize.set(4096,4096);                    // tight box + 4k map → real contact shadows on small items
  key.shadow.camera.left=-30; key.shadow.camera.right=30;
  key.shadow.camera.top=30; key.shadow.camera.bottom=-30;
  key.shadow.camera.near=5; key.shadow.camera.far=110;
  key.shadow.bias=-0.0003;
  key.shadow.normalBias=0.02;
  scene.add(key);

  const fill = new THREE.DirectionalLight(0xcfe6ff, 0.30);
  fill.position.set(-20, 18, -18);
  scene.add(fill);

  // (the old 5 point lights are replaced by RectAreaLight fluorescent strips — see the ceiling section)

  /* ---------- room ---------- */
  const STORE = {minX:-24,maxX:24,minZ:-22,maxZ:16};

  function floorTexture(){
    const c=document.createElement('canvas');c.width=c.height=512;const x=c.getContext('2d');
    const TILE=256;                 // 2x2 tiles per texture, checkerboard of two greys
    const A='#c3c7cb', B='#b3b8bd';
    for(let ty=0;ty<2;ty++)for(let tx=0;tx<2;tx++){
      x.fillStyle=((tx+ty)%2)?A:B;
      x.fillRect(tx*TILE,ty*TILE,TILE,TILE);
    }
    // subtle speckle within tiles for a polished-stone look
    for(let i=0;i<3000;i++){const g=150+Math.random()*70;x.fillStyle='rgba('+g+','+g+','+(g+4)+','+(Math.random()*0.12)+')';
      x.fillRect(Math.random()*512,Math.random()*512,2,2);}
    // dark grout lines between tiles (clearly visible)
    x.strokeStyle='rgba(70,74,80,0.65)';x.lineWidth=5;
    for(let i=0;i<=512;i+=TILE){x.beginPath();x.moveTo(i,0);x.lineTo(i,512);x.moveTo(0,i);x.lineTo(512,i);x.stroke();}
    x.strokeStyle='rgba(255,255,255,0.18)';x.lineWidth=1;  // tiny highlight beside grout
    for(let i=0;i<=512;i+=TILE){x.beginPath();x.moveTo(i+3,0);x.lineTo(i+3,512);x.moveTo(0,i+3);x.lineTo(512,i+3);x.stroke();}
    const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(20,18);
    t.anisotropy=MAXANISO;t.colorSpace=THREE.SRGBColorSpace;return t;
  }
  // soft blotchy roughness variation — polished lino with smudges/scuffs instead of uniform gloss
  function smudgeRoughness(){
    const S=512,c=document.createElement('canvas');c.width=c.height=S;const g=c.getContext('2d');
    g.fillStyle='#9a9a9a';g.fillRect(0,0,S,S);
    for(let i=0;i<140;i++){
      const x=Math.random()*S,y=Math.random()*S,r=20+Math.random()*90;
      const v=Math.floor(100+Math.random()*90);
      const gr=g.createRadialGradient(x,y,0,x,y,r);
      gr.addColorStop(0,'rgba('+v+','+v+','+v+',0.22)');gr.addColorStop(1,'rgba('+v+','+v+','+v+',0)');
      g.fillStyle=gr;g.beginPath();g.arc(x,y,r,0,7);g.fill();
    }
    const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(6,6);
    return t;
  }
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(120,120),
    new THREE.MeshStandardMaterial({map:floorTexture(),roughnessMap:smudgeRoughness(),roughness:0.58,metalness:0.05,color:0xffffff,envMapIntensity:0.4})
  );
  floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);

  const wallMat = new THREE.MeshStandardMaterial({color:0xc8c0b2,roughness:0.95});
  function wall(w,h,x,y,z,ry){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.5),wallMat);
    m.position.set(x,y,z);m.rotation.y=ry;m.receiveShadow=true;scene.add(m);return m;
  }
  const WH=14, depth=STORE.maxZ-STORE.minZ, swidth=STORE.maxX-STORE.minX, cz=(STORE.minZ+STORE.maxZ)/2;
  wall(swidth+2,WH,0,WH/2,STORE.minZ-0.6,0);
  wall(depth+2,WH,STORE.minX-0.6,WH/2,cz,Math.PI/2);
  wall(depth+2,WH,STORE.maxX+0.6,WH/2,cz,Math.PI/2);
  // storefront wall — the open side used to show bare void + HDRI floor glare
  wall(swidth+2,WH,0,WH/2,STORE.maxZ+0.6,0);
  const storefrontGlass=new THREE.MeshPhysicalMaterial({color:0x22333c,roughness:0.08,metalness:0.3,envMapIntensity:0.9});
  [-14.5,0,14.5].forEach(gx=>{
    const win=new THREE.Mesh(new THREE.BoxGeometry(11,3.4,0.2),storefrontGlass);
    win.position.set(gx,2.6,STORE.maxZ+0.28);scene.add(win);
    const frame=new THREE.Mesh(new THREE.BoxGeometry(11.4,0.25,0.26),
      new THREE.MeshStandardMaterial({color:0x16324F,roughness:0.5,metalness:0.3}));
    frame.position.set(gx,4.45,STORE.maxZ+0.28);scene.add(frame);
  });
  const welcome=makeText3D("WELCOME",1.0,0x16324F,0,5.6,STORE.maxZ+0.15);
  welcome.rotation.y=Math.PI;scene.add(welcome);

  const band=new THREE.Mesh(new THREE.BoxGeometry(swidth+2,2.4,0.1),
    new THREE.MeshStandardMaterial({color:0x16324F,emissive:0x0a2238,emissiveIntensity:0.4,roughness:0.6}));
  band.position.set(0,10.4,STORE.minZ-0.3);scene.add(band);
  scene.add(makeText3D("FRESHMART",1.7,0xffffff,0,10.4,STORE.minZ-0.2));

  const ceil=new THREE.Mesh(new THREE.PlaneGeometry(swidth+4,depth+4),
    new THREE.MeshStandardMaterial({color:0xf1f2f0,roughness:1}));
  ceil.rotation.x=Math.PI/2;ceil.position.set(0,WH,cz);scene.add(ceil);
  /* fluorescent strips along each aisle corridor: an emissive tube (what you see, what blooms)
     + a RectAreaLight beneath it (the actual soft retail light — the "supermarket look") */
  RectAreaLightUniformsLib.init();
  const fixtureMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xfffdf4,emissiveIntensity:2.2});
  const STRIP_LEN=30, STRIP_CZ=-3;
  [-20,-10,0,10,20].forEach(ax=>{
    const tube=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.15,STRIP_LEN),fixtureMat);
    tube.position.set(ax,WH-0.2,STRIP_CZ);scene.add(tube);
    const rl=new THREE.RectAreaLight(0xfff4e2, 1.5, 1.6, STRIP_LEN);
    rl.position.set(ax,WH-0.28,STRIP_CZ);
    rl.lookAt(ax,0,STRIP_CZ);
    scene.add(rl);
  });

  /* ---------- sections (each item carries its real-world package shape) ---------- */
  const SECTIONS = {
    PANTRY:{x:-15,color:0xE0533D,sign:'#FF6B5C',items:[
      {n:'Pasta',e:'🍝',s:'box'},{n:'Beans',e:'🫘',s:'can'},{n:'Olive Oil',e:'🫒',s:'bottle'},
      {n:'Tomato',e:'🥫',s:'can'},{n:'Cereal',e:'🥣',s:'box'},{n:'Sea Salt',e:'🧂',s:'box'},
      {n:'Jam',e:'🫙',s:'jar'},{n:'Soup',e:'🍲',s:'can'}]},
    SNACKS:{x:-5,color:0xF5B700,sign:'#F5B700',items:[
      {n:'Cookies',e:'🍪',s:'box'},{n:'Chips',e:'🥔',s:'bag'},{n:'Choco',e:'🍫',s:'bar'},
      {n:'Crackers',e:'🧇',s:'box'},{n:'Popcorn',e:'🍿',s:'bag'},{n:'Pretzels',e:'🥨',s:'bag'},
      {n:'Candy',e:'🍬',s:'bag'},{n:'Mixed Nuts',e:'🥜',s:'jar'}]},
    BEVERAGES:{x:5,color:0x0FB5AE,sign:'#0FB5AE',items:[
      {n:'Juice',e:'🧃',s:'carton'},{n:'Cola',e:'🥤',s:'can'},{n:'Coffee',e:'☕',s:'can'},
      {n:'Green Tea',e:'🍵',s:'box'},{n:'Spring Water',e:'💧',s:'bottle'},{n:'Red Wine',e:'🍷',s:'bottle'},
      {n:'Lemonade',e:'🍋',s:'bottle'},{n:'Sparkling',e:'🫧',s:'bottle'}]},
    DAIRY:{x:15,color:0x4F86C6,sign:'#6FA6E0',items:[
      {n:'Whole Milk',e:'🥛',s:'carton'},{n:'Cheddar',e:'🧀',s:'block'},{n:'Butter',e:'🧈',s:'block'},
      {n:'Yogurt',e:'🥛',s:'tub'},{n:'Eggs',e:'🥚',s:'eggbox'},{n:'Cream',e:'🍶',s:'carton'}]}
  };

  /* ---------- 3D produce models (Kenney Food Kit, CC0) ---------- */
  const MANIFEST=window.ASSET_MANIFEST||{produce:{},products:[]};
  const MODELS={};         // produce name -> {scene, box}
  const PROTOS={};         // manifest product id -> normalized template Object3D
  // real models get auto-fitted to the store's per-shape heights so they sit uniformly next to photo products
  const TARGET_H={can:0.46,box:0.64,bag:0.62,carton:0.78,tub:0.29,jar:0.36,bar:0.52,block:0.29,eggbox:0.2,bottle:0.72};

  function tuneScanMaterials(root){
    root.traverse(function(o){
      if(o.isMesh&&o.material){
        o.castShadow=true;o.receiveShadow=true;
        o.material.envMapIntensity=0.55;
        if(!o.material.roughnessMap&&o.material.roughness===1) o.material.roughness=0.75; // GSO/YCB scans are albedo-only
        if(!o.material.metalnessMap) o.material.metalness=0;
      }
    });
  }
  // wrap a loaded model: centred on x/z, base at y=0, scaled so its height matches the target
  function makeProto(root,targetH,e){
    const g=new THREE.Group(), inner=new THREE.Group();
    if(e&&e.rot) root.rotation.set(e.rot[0]||0,e.rot[1]||0,e.rot[2]||0);  // stand up models that were scanned lying flat
    else if(e&&e.rotY) root.rotation.y=e.rotY;
    inner.add(root);
    const b=new THREE.Box3().setFromObject(inner);
    const size=b.getSize(new THREE.Vector3());
    // fit to shelf height, but never wider/deeper than one shelf slot —
    // guards against lying-flat scans exploding when scaled by their thin side
    const sc=Math.min(targetH/(size.y||1), 0.9/(size.x||1), 0.7/(size.z||1));
    inner.scale.setScalar(sc);
    inner.position.set(-(b.min.x+b.max.x)/2*sc,-b.min.y*sc,-(b.min.z+b.max.z)/2*sc);
    const mid=new THREE.Group();          // extra wrapper: yaw/flip about the vertical axis around the model's
    mid.add(inner);                       // own centre — survives the per-shelf rotation set in addProduct
    mid.rotation.y=((e&&e.yaw)||0)+((e&&e.flip)?Math.PI:0);
    g.add(mid);
    const bb=new THREE.Box3().setFromObject(g), sz=bb.getSize(new THREE.Vector3());
    g.userData.h=sz.y; g.userData.w=sz.x;  // fitted world size — drives facing-block spacing
    return g;
  }

  function b64ToBuf(b64){
    const bin=atob(b64), len=bin.length, u=new Uint8Array(len);
    for(let i=0;i<len;i++) u[i]=bin.charCodeAt(i);
    return u.buffer;
  }
  // load produce models (real scans from the manifest, embedded Kenney as fallback)
  // and the real shelf-product templates
  function loadAllModels(done){
    const gltfLoader=new GLTFLoader();
    let pending=1;                          // guard so done() can't fire before everything is queued
    function step(){ if(--pending===0) done(); }

    // embedded Kenney fallback
    const manager=new THREE.LoadingManager();
    manager.setURLModifier(function(u){return /colormap\.png$/i.test(u)?window.FOODKIT_COLORMAP:u;});
    const kenney=new GLTFLoader(manager);
    const DB=window.FOODKIT_MODELS||{};
    function embeddedLoad(nm,cb){
      const b64=DB[nm]; if(!b64){console.warn('no embedded model:',nm);return false;}
      kenney.parse(b64ToBuf(b64),'',function(g){
        const root=g.scene;
        root.traverse(function(o){ if(o.isMesh){o.castShadow=true;o.receiveShadow=true;
          if(o.material){o.material.metalness=0.0;o.material.roughness=0.72;o.material.envMapIntensity=0.4;} } });
        MODELS[nm]={scene:root,box:new THREE.Box3().setFromObject(root)};
        cb();
      },function(err){console.warn('model parse failed:',nm,err);cb();});
      return true;
    }

    // produce: real scan > procedural model > embedded Kenney
    const names={}; PRODUCE.forEach(p=>names[p.name]=1);
    Object.keys(names).forEach(function(nm){
      pending++;
      const m=(MANIFEST.produce||{})[nm];
      if(m){
        gltfLoader.load(m.file,function(g){
          let root=m.node?(g.scene.getObjectByName(m.node)||g.scene):g.scene;
          root=root.clone(true);
          tuneScanMaterials(root);
          MODELS[nm]={scene:root,box:new THREE.Box3().setFromObject(root)};
          step();

    p.traverse(function(o){ if(o.isMesh){ o.castShadow=false; o.receiveShadow=true; } });

    p.userData={item:item,price:+(1.49+Math.random()*8).toFixed(2),base:p.scale.clone()};
    grp.add(p);
    p.updateMatrixWorld();

    // stock: unique catalog products + real-model extras interleaved through them.
    // Each product is placed as a FACING BLOCK (2-4 copies side by side, like a real

    const stock=(CATALOG[sectionName]||[]).slice();

        const F=Math.max(1,Math.min(4,Math.floor(24/n),Math.floor((slot-0.15)/w)));

  function coldLabel(title,sub,bg,fg){

    g.fillStyle='rgba(255,255,255,0.92)';

    g.fillStyle=fg;g.textAlign='center';g.textBaseline='middle';
    g.font='800 64px Outfit, sans-serif';
    const words=title.split(' ');
    if(words.length>1&&title.length>10){
      g.fillText(words.slice(0,Math.ceil(words.length/2)).join(' '),256,102);
      g.fillText(words.slice(Math.ceil(words.length/2)).join(' '),256,158);
    } else g.fillText(title,256,116);
    g.font='600 30px Outfit, sans-serif';g.fillStyle='#555';
    g.fillText(sub,256,words.length>1&&title.length>10?196:170);

    return t;

    PANTRY:'Aisle 1 — far left. Pasta, beans, oils, canned goods & cereal.',
    SNACKS:'Aisle 2. Cookies, chips, chocolate and all the good crunchy stuff.',
    BEVERAGES:'Aisle 3. Juice, soda, coffee, tea, water and a little wine. 🍷',
    DAIRY:'Aisle 4 — far right. Milk, cheese, butter, yogurt and eggs.',
    PRODUCE:"Right at the entrance up front — that's my home turf! 🍎🍌"
  };
  function locate(q){
    q=q.toLowerCase();
    for(const sec of Object.keys(SECTIONS)){
      for(const it of SECTIONS[sec].items){
        const first=it.n.toLowerCase().split(' ')[0];
        if(q.includes(first)||q.includes(it.n.toLowerCase())) return {sec:sec,name:it.n};
      }
    }
    const prod=['apple','orange','banana','grape','fruit','veg','tomato','lettuce','produce'];
    if(prod.some(p=>q.includes(p))) return {sec:'PRODUCE',name:'fresh produce'};
    return null;
  }

  const RESP={
    greet:["Well hello! 🍌 Ready to fill that cart? Ask me where anything is!",
           "Hey hey! Great to see a friendly face. What are we hunting for today?",
           "Top of the morning! Or afternoon. I'm a banana, I don't track time well. 😄"],
    help:["I can <b>guide you to any aisle</b>, suggest recipes, share today's deals, or just keep you company. Try: <i>“where is the milk?”</i>",
          "Ask me things like <i>“find coffee”</i>, <i>“what's on sale?”</i>, or <i>“recommend dinner”</i>. I'm a multi-tasking fruit!"],
    deals:["🔥 Today's deals: <b>2-for-1 cereal</b> in Aisle 1, <b>30% off cheese</b> in Aisle 4, and bulk coffee is a steal in Aisle 3!",
           "Psst — the <b>chocolate in Aisle 2</b> is buy-2-get-1. You didn't hear it from me. 🍫"],
    thanks:["Anytime! That's what I'm here for. 🍌","My pleasure — go bananas! 😄","You're very welcome, friend."],
    joke:["Why did the banana go to the doctor? It wasn't <i>peeling</i> well! 🍌",
          "What do you call two banana halves? A pair of <i>slippers</i>. 😂",
          "I told my friend a banana joke. He found it… <i>a-peeling</i>.",
          "Why don't bananas get lonely? They hang around in <i>bunches</i>!"],
    self:["I'm Mr. Peel — a sentient banana with excellent produce knowledge and questionable upper-body strength. 🍌",
          "Me? Just a humble banana doing concierge work. The pay is mostly compliments and sunlight."],
    recipe:["🍝 How about <b>creamy garlic pasta</b>? Grab pasta (Aisle 1), cheese & butter (Aisle 4). Quick and cozy!",
            "Taco night! 🌮 Beans & tomatoes from Aisle 1, cheese from Aisle 4, and fixings up front in Produce.",
            "Feeling fancy? <b>Cheese & wine night</b> — Aisle 4 for cheese, Aisle 3 for wine, crackers from Aisle 2. 🍷🧀"],
    bye:["Catch you later — drive safe through those aisles! 🛒","Bye for now! Don't forget your bananas. 🍌"],
    fallback:["Hmm, I'm not sure about that one, but ask me where any item is and I'll point the way! 🍌",
              "I mostly speak fluent <i>grocery</i>. Try asking me to <i>find</i> something or for today's <i>deals</i>!",
              "That's above my pay grade (I'm a banana 🍌). But I'm great with directions — what are you looking for?"]
  };
  function pick(a){return a[Math.floor(Math.random()*a.length)];}

  function respond(text){
    const q=text.toLowerCase().trim();
    const loc=locate(q);
    if(/(where|find|locate|aisle|which way|looking for|need)/.test(q)){
      if(loc) return "🛒 <b>"+loc.name+"</b> → "+STORE_MAP[loc.sec]+(loc.sec==='PRODUCE'?'':' Steer your cart over and press Space to grab it!');
      return "I can find loads of things! Try a specific item — milk, coffee, pasta, chips, cheese, wine, fruit… what'll it be?";
    }
    if(loc && /(milk|coffee|pasta|chip|cheese|wine|cookie|juice|soda|cola|tea|water|bean|cereal|chocolate|choco|butter|egg|apple|banana|orange|grape)/.test(q))
      return "Looking for <b>"+loc.name+"</b>? "+STORE_MAP[loc.sec];
    if(/(^hi|hello|hey|yo|howdy|sup)/.test(q)) return pick(RESP.greet);
    if(/(help|what can you|how do|controls|move|drive)/.test(q)) return pick(RESP.help);
    if(/(deal|sale|discount|cheap|coupon|offer|special)/.test(q)) return pick(RESP.deals);
    if(/(cart|how many|my items|basket|total|spent)/.test(q))
      return "You've got <b>"+count+" item"+(count===1?'':'s')+"</b> in the cart, totaling <b>$"+total.toFixed(2)+"</b>. "+(count>5?'Big shop today! 💪':'Keep it rolling!');
    if(/(thank|thx|cheers|appreciate)/.test(q)) return pick(RESP.thanks);
    if(/(joke|funny|laugh|pun)/.test(q)) return pick(RESP.joke);
    if(/(who are you|your name|what are you|about you)/.test(q)) return pick(RESP.self);
    if(/(recipe|dinner|cook|hungry|meal|recommend|suggest|idea|eat)/.test(q)) return pick(RESP.recipe);
    if(/(bye|goodbye|see ya|later|cya)/.test(q)) return pick(RESP.bye);
    if(/banana/.test(q)) return "🍌 You said the magic word! Bananas are 75% water, 100% delicious, and the front Produce section has a fresh bunch waiting!";
    return pick(RESP.fallback);
  }

  function addMsg(html,who){
    const m=document.createElement('div');m.className='msg '+who;m.innerHTML=html;
    chat.appendChild(m);chat.scrollTop=chat.scrollHeight;
  }
  let voice=null;
  function loadVoice(){
    const vs=speechSynthesis.getVoices();
    voice=vs.find(v=>/female|samantha|karen|google us/i.test(v.name))||vs.find(v=>/en/i.test(v.lang))||vs[0];
  }
  if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=loadVoice;loadVoice();}

  function speak(text){
    if(!('speechSynthesis' in window)) return;
    const plain=text.replace(/<[^>]+>/g,'').replace(/[^\x00-\x7F]+/g,'');
    try{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(plain);
      if(voice)u.voice=voice;u.pitch=1.35;u.rate=1.04;u.volume=0.9;
      u.onstart=()=>avatarEl.classList.add('talking');
      u.onend=()=>avatarEl.classList.remove('talking');
      speechSynthesis.speak(u);
    }catch(e){}
  }

  let firstSpeak=false;
  function bananaSay(html,isGreeting){
    addMsg(html,'bot');
    avatarEl.classList.add('talking');
    setTimeout(()=>avatarEl.classList.remove('talking'),Math.min(4000,html.length*45));
    if(!isGreeting||firstSpeak) speak(html);
  }

  function userSend(text){
    if(!text.trim())return;
    addMsg(text,'me');
    firstSpeak=true;
    setTimeout(()=>{bananaSay(respond(text));},340);
  }
  sendBtn.addEventListener('click',()=>{const v=chatInput.value;chatInput.value='';userSend(v);});
  chatInput.addEventListener('keydown',e=>{if(e.key==='Enter'){const v=chatInput.value;chatInput.value='';userSend(v);}});

  ['Where is the milk?',"Today's deals",'Recommend dinner','Tell me a joke',"What's in my cart?"].forEach(t=>{
    const c=document.createElement('div');c.className='chip';c.textContent=t;
    c.onclick=()=>userSend(t);chipsEl.appendChild(c);
  });

  /* ---------- collapsed launcher · typewriter teaser · expand / collapse ---------- */
  const widget=document.getElementById('chatWidget');
  const launcher=document.getElementById('launcher');
  const closeChat=document.getElementById('closeChat');
  const teaserEl=document.getElementById('teaser');
  const teaserTextEl=document.getElementById('teaserText');
  const TEASER_MSG="Hi, how can I help you?";

  let teaserTid=null, typeTid=null;

  function stopTeaser(){
    clearTimeout(teaserTid); clearInterval(typeTid);
    teaserTid=null; typeTid=null;
  }

  // type the teaser out character-by-character, hold for 1 min, hide,
  // wait 1 min, then type it out again — repeating while collapsed
  function runTeaserCycle(){
    if(!widget.classList.contains('collapsed')) return;
    teaserTextEl.textContent='';
    teaserEl.classList.add('show');
    let i=0;
    clearInterval(typeTid);
    typeTid=setInterval(()=>{
      teaserTextEl.textContent=TEASER_MSG.slice(0,++i);
      if(i>=TEASER_MSG.length){ clearInterval(typeTid); typeTid=null; }
    },48);
    teaserTid=setTimeout(()=>{                       // …stays for 1 minute
      teaserEl.classList.remove('show');
      teaserTid=setTimeout(runTeaserCycle,60000);    // …reappears 1 minute later
    },60000);
  }

  function expandChat(){
    stopTeaser();
    teaserEl.classList.remove('show');
    widget.classList.remove('collapsed');
    widget.classList.add('expanded');
    chat.scrollTop=chat.scrollHeight;
    setTimeout(()=>{try{chatInput.focus();}catch(e){}},320);
  }

  function collapseChat(){
    widget.classList.remove('expanded');
    widget.classList.add('collapsed');
    stopTeaser();
    teaserTid=setTimeout(runTeaserCycle,1200);       // resume the teaser cycle
  }

  launcher.addEventListener('click',expandChat);
  teaserEl.addEventListener('click',expandChat);
  closeChat.addEventListener('click',collapseChat);

  let grabComments=0;
  let toastTid=null;
  function onGrab(item,cnt,tot){
    const t=document.getElementById('toast');
    t.innerHTML='🛒 Added <b style="color:var(--gold)">'+item.n+'</b> to cart';
    t.classList.add('show');clearTimeout(toastTid);
    toastTid=setTimeout(()=>t.classList.remove('show'),1400);
    grabComments++;
    if(grabComments%3===0){
      const lines=["Nice pick — that <b>"+item.n+"</b> is fresh today! 🍌",
        "Ooh, <b>"+item.n+"</b>! Excellent taste. Your total is now <b>$"+tot.toFixed(2)+"</b>.",
        cnt+" items and counting — you're a natural at this! 🛒"];
      bananaSay(pick(lines));
    }
  }
}

/* boot — module scripts are deferred, so the DOM and the classic data scripts
   (models.js / products.js window globals) are ready by the time this runs */
main();
</script>
</body>
</html>
